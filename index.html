<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FontPack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:wght@400;700&family=Satisfy&family=Bebas+Neue&family=Lobster&family=Pacifico&family=Dancing+Script:wght@400;700&family=Righteous&family=Permanent+Marker&family=Alfa+Slab+One&family=Cinzel:wght@400;700;900&family=Monoton&family=Press+Start+2P&family=Creepster&family=Titan+One&family=Abril+Fatface&family=Fredoka+One&family=Bungee&family=Bungee+Shade&family=Bungee+Inline&family=Russo+One&family=Bangers&family=Lilita+One&family=Fugaz+One&family=Sigmar+One&family=Ultra&family=Black+Ops+One&family=Squada+One&family=Audiowide&family=Rammetto+One" rel="stylesheet">
<style>
:root{--bg:#070709;--s1:#0e0e14;--s2:#16161f;--s3:#1e1e2a;--a1:#ff4d6d;--a2:#c77dff;--a3:#4cc9f0;--a4:#f8961e;--a5:#43e97b;--text:#eeeef5;--muted:#44445a;--border:#1e1e2a;--r:18px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* BG orbs */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:orbFloat linear infinite}
.orb1{width:300px;height:300px;background:var(--a1);top:-100px;left:-100px;animation-duration:20s}
.orb2{width:250px;height:250px;background:var(--a2);bottom:-80px;right:-80px;animation-duration:25s;animation-delay:-10s}
.orb3{width:200px;height:200px;background:var(--a3);top:40%;left:30%;animation-duration:18s;animation-delay:-5s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-20px,40px) scale(.9)}100%{transform:translate(0,0) scale(1)}}

/* Header */
.header{position:relative;z-index:10;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,7,9,.9);backdrop-filter:blur(20px);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Abril Fatface',serif;font-size:17px;color:#fff;flex-shrink:0}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:-3px}
.hbtns{display:flex;gap:7px}
.hbtn{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:all .2s}
.hbtn:hover{border-color:var(--a1);color:var(--a1)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(7,7,9,.7);backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:10;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--a1)}

/* Main */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* Input */
.input-area{padding:14px 14px 8px;position:sticky;top:0;z-index:8;background:rgba(7,7,9,.95);backdrop-filter:blur(30px);border-bottom:1px solid var(--border)}
.text-field{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:13px;padding:12px 15px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color .25s,box-shadow .25s}
.text-field:focus{border-color:var(--a2);box-shadow:0 0 0 3px rgba(199,125,255,.12)}
.quick-row{display:flex;gap:6px;margin-top:8px;overflow-x:auto;scrollbar-width:none}
.quick-row::-webkit-scrollbar{display:none}
.quick-chip{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.quick-chip:hover{border-color:var(--a3);color:var(--a3)}

/* Controls */
.ctrl-bar{display:flex;align-items:center;gap:10px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.ctrl-bar::-webkit-scrollbar{display:none}
.ctrl-label{font-size:9px;color:var(--muted);letter-spacing:2px;flex-shrink:0}
.size-slider{flex:1;min-width:80px;-webkit-appearance:none;appearance:none;height:4px;background:var(--s3);border-radius:2px;outline:none}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(255,77,109,.4);transition:transform .15s}
.size-slider:active::-webkit-slider-thumb{transform:scale(1.25)}
.size-display{font-size:12px;color:var(--a1);min-width:28px;text-align:center;flex-shrink:0}
.color-dots{display:flex;gap:6px;flex-shrink:0}
.color-dot{width:21px;height:21px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-dot.active{border-color:#fff;transform:scale(1.18)}

/* Font cards */
.fonts-container{padding:10px 10px 110px}
.font-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) both;position:relative}
@keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.font-card:hover{border-color:rgba(255,77,109,.35);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.45)}
.font-card.selected{border-color:var(--a1);box-shadow:0 0 0 1px var(--a1),0 12px 40px rgba(255,77,109,.15)}
.font-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3));opacity:0;transition:opacity .2s}
.font-card.selected::before{opacity:1}
.card-top{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 8px}
.card-name{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.card-tag{font-size:9px;padding:3px 8px;border-radius:6px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.t-serif{background:rgba(199,125,255,.15);color:var(--a2)}
.t-display{background:rgba(255,77,109,.15);color:var(--a1)}
.t-script{background:rgba(67,233,123,.15);color:var(--a5)}
.t-mono{background:rgba(76,201,240,.15);color:var(--a3)}
.t-retro{background:rgba(248,150,30,.15);color:var(--a4)}
.t-gothic{background:rgba(255,77,109,.1);color:#ff8fa3}
.t-bold{background:rgba(76,201,240,.1);color:var(--a3)}
.card-preview{padding:4px 15px 14px;font-size:36px;line-height:1.15;word-break:break-word;transition:font-size .2s;min-height:58px}
.card-bottom{border-top:1px solid var(--border);display:flex;align-items:center;padding:9px 10px;gap:7px}
.card-btn{flex:1;background:transparent;border:1px solid var(--border);border-radius:9px;padding:8px 5px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;text-transform:uppercase;transition:all .2s}
.card-btn:hover{border-color:var(--a3);color:var(--a3)}
.card-btn.sel-btn{border-color:var(--a1);color:var(--a1);background:rgba(255,77,109,.08)}
.card-btn.sel-btn.on{background:var(--a1);color:#fff}

/* Symbols */
.symbols-grid{padding:10px 10px 110px;display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.sym-cat-title{grid-column:1/-1;font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;padding:12px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.sym-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--border);border-radius:12px;font-size:22px;cursor:pointer;transition:all .18s;user-select:none}
.sym-cell:hover{background:var(--s3);transform:scale(1.12);border-color:var(--a2)}
.sym-cell:active{transform:scale(.9)}

/* Combiner */
.combiner-wrap{padding:14px 14px 110px}
.cmb-preview{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px 16px;text-align:center;margin-bottom:14px;min-height:100px;display:flex;align-items:center;justify-content:center;font-size:30px;line-height:1.3;word-break:break-all;transition:all .3s}
.cmb-label{font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:9px;margin-top:4px}
.cmb-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cmb-opt{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:9px 13px;cursor:pointer;font-size:13px;transition:all .2s}
.cmb-opt:hover{border-color:var(--a2);background:var(--s2)}
.cmb-opt.on{border-color:var(--a2);background:rgba(199,125,255,.1)}
.cmb-action{width:100%;padding:14px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:12px;color:#fff;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-bottom:8px}
.cmb-action:hover{opacity:.85}
.cmb-action.sec{background:var(--s2);border:1px solid var(--border);color:var(--muted)}

/* Export bar */
.export-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(7,7,9,.97);backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px}
.eb-preview{flex:1;min-width:0}
.eb-font{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.eb-text{font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:font-family .3s}
.eb-btns{display:flex;gap:7px;flex-shrink:0}
.eb-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.eb-btn:hover{border-color:var(--a3);color:var(--a3)}
.eb-btn.save{background:linear-gradient(135deg,var(--a1),var(--a2));border-color:transparent;color:#fff;box-shadow:0 4px 20px rgba(255,77,109,.3)}
.eb-btn.save:hover{opacity:.85}

/* Toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s2);border:1px solid var(--a5);border-radius:10px;padding:10px 18px;font-size:11px;color:var(--a5);letter-spacing:1px;z-index:100;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Ripple */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);transform:scale(0);animation:rpl .55s linear;pointer-events:none}
@keyframes rpl{to{transform:scale(4);opacity:0}}

/* Tab sections */
.tab-section{display:none}
.tab-section.active{display:block}
canvas{display:none}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">F</div>
    <div>
      <div class="logo-text">FONTPACK</div>
      <div class="logo-sub">PRO · 30 FONTS · FREE</div>
    </div>
  </div>
  <div class="hbtns">
    <button class="hbtn" id="copyAllBtn">📋 Copy</button>
    <button class="hbtn" id="saveAllBtn">💾 PNG</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="fonts">✦ Fonts</div>
  <div class="tab" data-tab="symbols">❋ Symbols</div>
  <div class="tab" data-tab="combiner">⚡ Combiner</div>
</div>

<div class="main">
  <div class="input-area">
    <input class="text-field" id="mainInput" type="text" placeholder="Type your text..." value="Hello World ✨">
    <div class="quick-row" id="quickRow"></div>
  </div>

  <div class="ctrl-bar">
    <div class="ctrl-label">SIZE</div>
    <input class="size-slider" id="sizeSlider" type="range" min="16" max="72" value="34">
    <div class="size-display" id="sizeDisplay">34</div>
    <div class="color-dots" id="colorDots"></div>
  </div>

  <!-- FONTS -->
  <div class="tab-section active" id="tab-fonts">
    <div class="fonts-container" id="fontsContainer"></div>
  </div>

  <!-- SYMBOLS -->
  <div class="tab-section" id="tab-symbols">
    <div class="symbols-grid" id="symbolsGrid"></div>
  </div>

  <!-- COMBINER -->
  <div class="tab-section" id="tab-combiner">
    <div class="combiner-wrap">
      <div class="cmb-label">Live Preview</div>
      <div class="cmb-preview" id="cmbPreview">Hello World ✨</div>
      <div class="cmb-label">Decorations</div>
      <div class="cmb-options" id="cmbDecs"></div>
      <div class="cmb-label">Frames & Borders</div>
      <div class="cmb-options" id="cmbFrames"></div>
      <button class="cmb-action" id="cmbCopy">📋 Copy Combined Text</button>
      <button class="cmb-action sec" id="cmbReset">↺ Reset All</button>
    </div>
  </div>
</div>

<div class="export-bar">
  <div class="eb-preview">
    <div class="eb-font" id="ebFont">Playfair Display</div>
    <div class="eb-text" id="ebText">Hello World ✨</div>
  </div>
  <div class="eb-btns">
    <button class="eb-btn" id="copyBtn">Copy</button>
    <button class="eb-btn save" id="saveBtn">Save PNG</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="canvas"></canvas>

<script>
const FONTS=[
  {name:'Playfair Display',css:"'Playfair Display',serif",tag:'Serif',tc:'t-serif'},
  {name:'Cinzel',css:"'Cinzel',serif",tag:'Serif',tc:'t-serif'},
  {name:'Alfa Slab One',css:"'Alfa Slab One',serif",tag:'Serif',tc:'t-serif'},
  {name:'Ultra',css:"'Ultra',serif",tag:'Serif',tc:'t-serif'},
  {name:'Abril Fatface',css:"'Abril Fatface',cursive",tag:'Display',tc:'t-display'},
  {name:'Bebas Neue',css:"'Bebas Neue',sans-serif",tag:'Display',tc:'t-display'},
  {name:'Bungee',css:"'Bungee',sans-serif",tag:'Display',tc:'t-display'},
  {name:'Bungee Shade',css:"'Bungee Shade',sans-serif",tag:'Display',tc:'t-display'},
  {name:'Bungee Inline',css:"'Bungee Inline',sans-serif",tag:'Display',tc:'t-display'},
  {name:'Bangers',css:"'Bangers',cursive",tag:'Display',tc:'t-display'},
  {name:'Titan One',css:"'Titan One',cursive",tag:'Display',tc:'t-display'},
  {name:'Fredoka One',css:"'Fredoka One',cursive",tag:'Display',tc:'t-display'},
  {name:'Fugaz One',css:"'Fugaz One',cursive",tag:'Display',tc:'t-display'},
  {name:'Lilita One',css:"'Lilita One',cursive",tag:'Display',tc:'t-display'},
  {name:'Sigmar One',css:"'Sigmar One',cursive",tag:'Display',tc:'t-display'},
  {name:'Black Ops One',css:"'Black Ops One',cursive",tag:'Bold',tc:'t-bold'},
  {name:'Russo One',css:"'Russo One',sans-serif",tag:'Bold',tc:'t-bold'},
  {name:'Squada One',css:"'Squada One',cursive",tag:'Bold',tc:'t-bold'},
  {name:'Rammetto One',css:"'Rammetto One',cursive",tag:'Bold',tc:'t-bold'},
  {name:'Righteous',css:"'Righteous',cursive",tag:'Bold',tc:'t-bold'},
  {name:'Dancing Script',css:"'Dancing Script',cursive",tag:'Script',tc:'t-script'},
  {name:'Pacifico',css:"'Pacifico',cursive",tag:'Script',tc:'t-script'},
  {name:'Lobster',css:"'Lobster',cursive",tag:'Script',tc:'t-script'},
  {name:'Satisfy',css:"'Satisfy',cursive",tag:'Script',tc:'t-script'},
  {name:'Permanent Marker',css:"'Permanent Marker',cursive",tag:'Script',tc:'t-script'},
  {name:'Monoton',css:"'Monoton',cursive",tag:'Retro',tc:'t-retro'},
  {name:'Press Start 2P',css:"'Press Start 2P',cursive",tag:'Retro',tc:'t-retro'},
  {name:'Audiowide',css:"'Audiowide',sans-serif",tag:'Retro',tc:'t-retro'},
  {name:'Creepster',css:"'Creepster',cursive",tag:'Gothic',tc:'t-gothic'},
  {name:'Space Mono',css:"'Space Mono',monospace",tag:'Mono',tc:'t-mono'},
];

const COLORS=[
  {hex:'#eeeef5'},{hex:'#ff4d6d'},{hex:'#c77dff'},{hex:'#4cc9f0'},
  {hex:'#f8961e'},{hex:'#43e97b'},{hex:'#ffd166'},{hex:'#ff9ede'},
];

const QUICK=['Hello World','My Name','✨ Glow Up','🔥 Fire','GAME OVER','Primejtsu','Cool Text','꧁ King ꧂'];

const SYMBOLS={
  'Stars & Sparkles':['✨','⭐','🌟','💫','✦','✧','★','☆','⚡','🌠','🌙','☀️','🌈','❄️','🔥','💥'],
  'Hearts':['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💕','💞','💓','💗','💖','💝','💘','♥'],
  'Arrows':['→','←','↑','↓','↗','↘','⟶','⟵','➔','➜','➤','►','◄','▲','▼','◆'],
  'Crown & Power':['👑','🏆','💎','🎯','🎖','🥇','⚔️','🛡️','🔮','🧬','🔑','🗝️','🏅','🎪','🎨','🎭'],
  'Nature':['🌸','🌺','🌻','🌹','🌷','🍀','🌿','🍃','🌊','⛰️','🌴','🦋','🐉','🦅','🐺','🌋'],
  'Aesthetic':['◈','◉','◎','●','○','◌','◍','◐','◑','◒','◓','◔','◕','◖','◗','⦿'],
  'Cool Unicode':['꧁','꧂','ꔪ','𖣘','𖤍','ꕤ','𓂀','𓆩','𓆪','ꗃ','꙰','彡','卍','ツ','シ','ッ'],
  'Shapes':['◀','▶','▬','▭','▮','▯','◧','◨','◩','◪','◫','◬','◭','◮','⬛','⬜'],
};

const DECS=[
  {label:'✨ sparkle',pre:'✨ ',suf:' ✨'},
  {label:'🔥 fire',pre:'🔥 ',suf:' 🔥'},
  {label:'👑 crown',pre:'👑 ',suf:' 👑'},
  {label:'彡 style',pre:'彡 ',suf:' 彡'},
  {label:'꧁꧂ fancy',pre:'꧁',suf:'꧂'},
  {label:'• dots •',pre:'• ',suf:' •'},
  {label:'» arrows «',pre:'» ',suf:' «'},
  {label:'ツ smile',pre:'ツ ',suf:' ツ'},
];

const FRAMES=[
  {label:'[ brackets ]',pre:'[ ',suf:' ]'},
  {label:'{ curly }',pre:'{ ',suf:' }'},
  {label:'《 double 》',pre:'《 ',suf:' 》'},
  {label:'【 square 】',pre:'【 ',suf:' 】'},
  {label:'─ line ─',pre:'──────\n',suf:'\n──────'},
  {label:'═ double ═',pre:'══════\n',suf:'\n══════'},
];

let selIdx=0, curColor=COLORS[0].hex, curSize=34, activeDecs=new Set(), activeFrame=-1;

function getText(){ return document.getElementById('mainInput').value||'Hello World'; }

// Quick texts
const qr=document.getElementById('quickRow');
QUICK.forEach(t=>{
  const c=document.createElement('div');
  c.className='quick-chip'; c.textContent=t;
  c.onclick=()=>{ document.getElementById('mainInput').value=t; refreshAll(); };
  qr.appendChild(c);
});

// Color dots
const cd=document.getElementById('colorDots');
COLORS.forEach((col,i)=>{
  const d=document.createElement('div');
  d.className='color-dot'+(i===0?' active':'');
  d.style.cssText=`background:${col.hex};box-shadow:0 2px 8px ${col.hex}66`;
  d.onclick=()=>{
    curColor=col.hex;
    document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('active'));
    d.classList.add('active'); refreshAll();
  };
  cd.appendChild(d);
});

// Build font cards
function buildCards(){
  const fc=document.getElementById('fontsContainer');
  fc.innerHTML='';
  FONTS.forEach((f,i)=>{
    const card=document.createElement('div');
    card.className='font-card'+(i===selIdx?' selected':'');
    card.style.animationDelay=(i*.03)+'s';
    card.innerHTML=`
      <div class="card-top">
        <div class="card-name">${f.name}</div>
        <div class="card-tag ${f.tc}">${f.tag}</div>
      </div>
      <div class="card-preview" id="cp${i}" style="font-family:${f.css};color:${curColor};font-size:${curSize}px">${escHtml(getText())}</div>
      <div class="card-bottom">
        <button class="card-btn" data-a="copy" data-i="${i}">Copy</button>
        <button class="card-btn" data-a="fname" data-i="${i}">Font Name</button>
        <button class="card-btn sel-btn${i===selIdx?' on':''}" data-a="sel" data-i="${i}">${i===selIdx?'✓ Selected':'Select'}</button>
      </div>`;
    card.addEventListener('click',e=>{
      if(e.target.dataset.a) return;
      ripple(card,e); selectFont(i);
    });
    fc.appendChild(card);
  });
}

function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function selectFont(i){
  selIdx=i; buildCards(); updateBar(); updateCmb();
}

function refreshAll(){
  FONTS.forEach((_,i)=>{
    const el=document.getElementById('cp'+i);
    if(el){ el.style.color=curColor; el.style.fontSize=curSize+'px'; el.innerHTML=escHtml(getText()); }
  });
  updateBar(); updateCmb();
}

function updateBar(){
  const f=FONTS[selIdx];
  document.getElementById('ebFont').textContent=f.name;
  const et=document.getElementById('ebText');
  et.style.fontFamily=f.css; et.style.color=curColor; et.textContent=getText();
}

function getCmb(){
  let t=getText();
  activeDecs.forEach(i=>{ t=DECS[i].pre+t+DECS[i].suf; });
  if(activeFrame>=0){ t=FRAMES[activeFrame].pre+t+FRAMES[activeFrame].suf; }
  return t;
}

function updateCmb(){
  const f=FONTS[selIdx], el=document.getElementById('cmbPreview');
  el.style.fontFamily=f.css; el.style.color=curColor; el.style.fontSize=curSize+'px';
  el.textContent=getCmb();
}

// Build symbols
function buildSymbols(){
  const grid=document.getElementById('symbolsGrid');
  Object.entries(SYMBOLS).forEach(([cat,syms])=>{
    const t=document.createElement('div'); t.className='sym-cat-title'; t.textContent=cat;
    grid.appendChild(t);
    syms.forEach(sym=>{
      const cell=document.createElement('div'); cell.className='sym-cell'; cell.textContent=sym;
      cell.onclick=()=>{
        const inp=document.getElementById('mainInput');
        const p=inp.selectionStart||inp.value.length;
        inp.value=inp.value.slice(0,p)+sym+inp.value.slice(p);
        refreshAll(); toast('Symbol added ✓');
        ripple(cell,{clientX:cell.getBoundingClientRect().left+11,clientY:cell.getBoundingClientRect().top+11});
      };
      grid.appendChild(cell);
    });
  });
}

// Build combiner
function buildCmb(){
  const dd=document.getElementById('cmbDecs'), ff=document.getElementById('cmbFrames');
  DECS.forEach((d,i)=>{
    const b=document.createElement('div'); b.className='cmb-opt'; b.textContent=d.label;
    b.onclick=()=>{ activeDecs.has(i)?activeDecs.delete(i):activeDecs.add(i); b.classList.toggle('on'); updateCmb(); };
    dd.appendChild(b);
  });
  FRAMES.forEach((f,i)=>{
    const b=document.createElement('div'); b.className='cmb-opt'; b.textContent=f.label;
    b.onclick=()=>{
      activeFrame=activeFrame===i?-1:i;
      ff.querySelectorAll('.cmb-opt').forEach(x=>x.classList.remove('on'));
      if(activeFrame===i) b.classList.add('on'); updateCmb();
    };
    ff.appendChild(b);
  });
}

function ripple(el,e){
  const r=document.createElement('div'), rect=el.getBoundingClientRect();
  r.className='ripple';
  r.style.cssText=`left:${e.clientX-rect.left-20}px;top:${e.clientY-rect.top-20}px;width:40px;height:40px`;
  el.style.position='relative'; el.appendChild(r);
  setTimeout(()=>r.remove(),600);
}

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// Size slider
document.getElementById('sizeSlider').addEventListener('input',e=>{
  curSize=parseInt(e.target.value);
  document.getElementById('sizeDisplay').textContent=curSize;
  refreshAll();
});

// Input
document.getElementById('mainInput').addEventListener('input',refreshAll);

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active');
    document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='combiner') updateCmb();
  });
});

// Card buttons
document.getElementById('fontsContainer').addEventListener('click',e=>{
  const btn=e.target.closest('[data-a]'); if(!btn) return;
  const i=parseInt(btn.dataset.i);
  if(btn.dataset.a==='copy'){ navigator.clipboard.writeText(getText()).catch(()=>{}); toast('Text copied ✓'); }
  else if(btn.dataset.a==='fname'){ navigator.clipboard.writeText(FONTS[i].name).catch(()=>{}); toast('Font name copied ✓'); }
  else if(btn.dataset.a==='sel'){ selectFont(i); toast(FONTS[i].name+' selected ✓'); }
});

// Copy / save buttons
document.getElementById('copyBtn').addEventListener('click',()=>{ navigator.clipboard.writeText(getText()).catch(()=>{}); toast('Copied ✓'); });
document.getElementById('copyAllBtn').addEventListener('click',()=>{ navigator.clipboard.writeText(getText()).catch(()=>{}); toast('Copied ✓'); });
document.getElementById('cmbCopy').addEventListener('click',()=>{ navigator.clipboard.writeText(getCmb()).catch(()=>{}); toast('Combined text copied ✓'); });
document.getElementById('cmbReset').addEventListener('click',()=>{ activeDecs.clear(); activeFrame=-1; document.querySelectorAll('.cmb-opt').forEach(x=>x.classList.remove('on')); updateCmb(); });

function saveImage(){
  const cnv=document.getElementById('canvas'), ctx=cnv.getContext('2d');
  const text=getText(), f=FONTS[selIdx], W=900, H=460;
  cnv.width=W; cnv.height=H;
  ctx.fillStyle='#070709'; ctx.fillRect(0,0,W,H);
  // glow orbs
  [['#ff4d6d',160,160],['#c77dff',740,300],['#4cc9f0',450,380]].forEach(([c,x,y])=>{
    const g=ctx.createRadialGradient(x,y,0,x,y,200);
    g.addColorStop(0,c+'28'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
  // top line
  const lg=ctx.createLinearGradient(0,0,W,0);
  lg.addColorStop(0,'#ff4d6d'); lg.addColorStop(.5,'#c77dff'); lg.addColorStop(1,'#4cc9f0');
  ctx.fillStyle=lg; ctx.fillRect(0,0,W,4);
  // text
  ctx.fillStyle=curColor; ctx.textAlign='center'; ctx.textBaseline='middle';
  let fs=curSize*2.2;
  ctx.font=`${fs}px ${f.css}`;
  while(ctx.measureText(text).width>W-80&&fs>20){ fs-=2; ctx.font=`${fs}px ${f.css}`; }
  ctx.shadowColor=curColor; ctx.shadowBlur=28;
  ctx.fillText(text,W/2,H/2-18);
  ctx.shadowBlur=0;
  // labels
  ctx.fillStyle='#33334a'; ctx.font='18px Space Mono,monospace';
  ctx.fillText(f.name.toUpperCase(),W/2,H/2+fs/2+28);
  ctx.font='13px Space Mono,monospace'; ctx.fillStyle='#22222e';
  ctx.fillText('FontPack Pro',W/2,H-16);
  const a=document.createElement('a');
  a.download=`fontpack-${f.name.replace(/\s/g,'-').toLowerCase()}.png`;
  a.href=cnv.toDataURL(); a.click();
  toast('Image saved ✓');
}

document.getElementById('saveBtn').addEventListener('click',saveImage);
document.getElementById('saveAllBtn').addEventListener('click',saveImage);

// Init
buildCards(); buildSymbols(); buildCmb(); updateBar();
</script>
</body>
</html>
